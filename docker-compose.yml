services:
  mu_user_management:
    build:
      context: .
      dockerfile: Dockerfile
    image: mu_user_management:latest
    container_name: mu_user_management
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${PORT:-8010}:${PORT:-8010}"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, urllib.request; port=os.getenv('PORT', '8010'); urllib.request.urlopen(f'http://127.0.0.1:{port}/health', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

services:
  - type: web
    name: mu-user-management
    env: docker
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PLATFORM_READ_DATABASE_URL
        sync: false
      - key: DEERFLOW_DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "720"
      - key: CORS_ORIGINS
        value: http://localhost:8010,http://127.0.0.1:8010
      - key: SMTP_HOST
        value: smtp.office365.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        value: noreply@ses.ai

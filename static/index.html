<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MU 用户管理</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260601-7" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <section id="loginView" class="login-layout">
        <div class="brand-block">
          <div class="mark">MU</div>
          <h1>用户管理</h1>
          <p>管理员工作台</p>
        </div>
        <form id="loginForm" class="login-form">
          <label>
            账号
            <input name="username" autocomplete="username" required />
          </label>
          <label>
            密码
            <input name="password" type="password" autocomplete="current-password" required />
          </label>
          <button type="submit" class="primary-button">
            <i data-lucide="log-in"></i>
            登录
          </button>
          <p id="loginError" class="error-text" role="alert"></p>
        </form>
      </section>

      <section id="adminView" class="admin-layout hidden">
        <header class="topbar">
          <div>
            <h1>用户管理</h1>
            <p id="adminName"></p>
          </div>
          <div class="topbar-actions">
            <button id="sendReportButton" class="tool-button" title="发送用户权限统计报告">
              <i data-lucide="mail-check"></i>
              发送统计报告
            </button>
            <button id="logoutButton" class="icon-button" title="退出登录" aria-label="退出登录">
              <i data-lucide="log-out"></i>
            </button>
          </div>
        </header>

        <section class="toolbar">
          <form id="filterForm" class="filters">
            <div class="filter-row filter-row-pair">
              <label>
                用户名
                <input name="username" placeholder="搜索用户名" />
              </label>
              <label>
                邮箱
                <input name="email" placeholder="搜索邮箱" />
              </label>
            </div>
            <div class="filter-row filter-row-pair">
              <label>
                组织
                <input name="organization_name" placeholder="搜索组织" />
              </label>
              <label>
                权限
                <select name="permissions">
                  <option value="">全部</option>
                  <option value="common">common</option>
                  <option value="trial">trial</option>
                  <option value="research">research</option>
                  <option value="explorer">explorer</option>
                  <option value="team">team</option>
                  <option value="enterprise1">enterprise1</option>
                  <option value="enterprise2">enterprise2</option>
                  <option value="enterprise3">enterprise3</option>
                  <option value="joint">joint</option>
                  <option value="admin">admin</option>
                </select>
              </label>
            </div>
            <div class="filter-row filter-row-actions">
              <label>
                关键词
                <input name="q" placeholder="模糊搜索保留字段" />
              </label>
              <div class="filter-actions">
                <button type="submit" class="tool-button" title="搜索">
                  <i data-lucide="search"></i>
                  搜索
                </button>
                <button id="batchCreateButton" type="button" class="tool-button">
                  <i data-lucide="users-round"></i>
                  批量新增
                </button>
                <button id="createButton" type="button" class="primary-button">
                  <i data-lucide="user-plus"></i>
                  新增用户
                </button>
              </div>
            </div>
          </form>
        </section>

        <section class="table-surface">
          <div class="table-meta">
            <span id="resultSummary">0 个用户</span>
            <div class="table-tools">
              <div class="column-picker">
                <button id="columnButton" type="button" class="tool-button" title="展示列">
                  <i data-lucide="columns-3"></i>
                  展示列
                </button>
                <div id="columnMenu" class="column-menu hidden"></div>
              </div>
              <div class="pager">
                <button id="prevPage" class="icon-button" title="上一页" aria-label="上一页">
                  <i data-lucide="chevron-left"></i>
                </button>
                <span id="pageInfo">1 / 1</span>
                <button id="nextPage" class="icon-button" title="下一页" aria-label="下一页">
                  <i data-lucide="chevron-right"></i>
                </button>
              </div>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr id="userTableHeader"></tr>
              </thead>
              <tbody id="userTableBody"></tbody>
            </table>
          </div>
          <div id="emptyState" class="empty-state hidden">暂无用户</div>
        </section>
      </section>
    </main>

    <dialog id="userDialog">
      <form id="userForm" method="dialog" class="dialog-form">
        <header>
          <h2 id="dialogTitle">新增用户</h2>
          <button type="button" id="closeDialog" class="icon-button" title="关闭" aria-label="关闭">
            <i data-lucide="x"></i>
          </button>
        </header>
        <input type="hidden" name="id" />
        <div class="form-grid">
          <label>
            用户名
            <input name="username" required />
          </label>
          <label>
            邮箱
            <input name="email" required />
          </label>
          <label>
            教育邮箱
            <input name="edu_email" />
          </label>
          <label>
            组织
            <input name="organization_name" />
          </label>
          <label>
            密码
            <input name="password" type="password" minlength="6" autocomplete="new-password" />
          </label>
          <label>
            权限
            <select name="permissions">
              <option value="common">common</option>
              <option value="trial">trial</option>
              <option value="research">research</option>
              <option value="explorer">explorer</option>
              <option value="team">team</option>
              <option value="enterprise1">enterprise1</option>
              <option value="enterprise2">enterprise2</option>
              <option value="enterprise3">enterprise3</option>
              <option value="joint">joint</option>
              <option value="admin">admin</option>
            </select>
          </label>
          <label>
            新权限
            <input name="permissions_new" />
          </label>
          <label>
            Teams 邮箱
            <input name="teams_email_reg" />
          </label>
          <label>
            订阅开始
            <input name="subscribe_start_at" type="datetime-local" />
          </label>
          <label>
            订阅结束
            <input name="subscribe_end_at" type="datetime-local" />
          </label>
          <label>
            创建日期
            <input name="created_at" type="datetime-local" />
          </label>
          <label>
            更新日期
            <input name="updated_at" type="datetime-local" />
          </label>
          <label class="checkbox-field">
            <input name="deleted" type="checkbox" />
            已删除
          </label>
        </div>
        <p id="formError" class="error-text" role="alert"></p>
        <footer>
          <button type="button" id="cancelDialog" class="tool-button">取消</button>
          <button type="submit" class="primary-button">
            <i data-lucide="save"></i>
            保存
          </button>
        </footer>
      </form>
    </dialog>

    <dialog id="batchDialog" class="batch-dialog">
      <section class="dialog-form">
        <header>
          <h2>批量新增用户</h2>
          <button type="button" id="closeBatchDialog" class="icon-button" title="关闭" aria-label="关闭">
            <i data-lucide="x"></i>
          </button>
        </header>
        <form id="batchForm" class="batch-content">
          <div class="batch-grid">
            <label>
              邮箱地址
              <textarea name="emails" rows="7" placeholder="user1@example.com, user2@example.com&#10;user3@example.com" required></textarea>
            </label>
            <div class="batch-fields">
              <label>
                公司组织
                <input name="organization_name" placeholder="留空则使用邮箱后缀，例如 example.com" />
              </label>
              <label>
                权限
                <select name="permissions">
                  <option value="common">common</option>
                  <option value="trial">trial</option>
                  <option value="research" selected>research</option>
                  <option value="explorer">explorer</option>
                  <option value="team">team</option>
                  <option value="enterprise1">enterprise1</option>
                  <option value="enterprise2">enterprise2</option>
                  <option value="enterprise3">enterprise3</option>
                  <option value="joint">joint</option>
                  <option value="admin">admin</option>
                </select>
              </label>
              <label>
                订阅开始
                <input name="subscribe_start_at" type="datetime-local" required />
              </label>
              <label>
                订阅结束
                <input name="subscribe_end_at" type="datetime-local" required />
              </label>
              <button type="submit" id="previewBatchButton" class="primary-button">
                <i data-lucide="list-checks"></i>
                生成插入信息
              </button>
            </div>
          </div>
          <p id="batchError" class="error-text" role="alert"></p>
        </form>
        <section id="batchPreviewSection" class="batch-section hidden">
          <div class="batch-section-title">
            <strong id="batchPreviewSummary">0 个待新增用户</strong>
            <span>确认后将逐条插入用户并发送临时密码邮件。</span>
          </div>
          <div class="batch-table-wrap">
            <table>
              <thead>
                <tr>
                  <th>用户名</th>
                  <th>邮箱</th>
                  <th>组织</th>
                  <th>权限</th>
                  <th>订阅开始</th>
                  <th>订阅结束</th>
                  <th>临时密码</th>
                </tr>
              </thead>
              <tbody id="batchPreviewBody"></tbody>
            </table>
          </div>
        </section>
        <section id="batchResultSection" class="batch-section hidden">
          <div class="batch-section-title">
            <strong id="batchResultSummary"></strong>
            <span id="batchFailureSummary"></span>
          </div>
          <div id="batchFailureWrap" class="batch-failure-wrap hidden">
            <div class="batch-table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>邮箱</th>
                    <th>用户名</th>
                    <th>阶段</th>
                    <th>原因</th>
                  </tr>
                </thead>
                <tbody id="batchFailureBody"></tbody>
              </table>
            </div>
          </div>
        </section>
        <footer>
          <button type="button" id="cancelBatchDialog" class="tool-button">关闭</button>
          <button type="button" id="confirmBatchButton" class="primary-button" disabled>
            <i data-lucide="send"></i>
            确认新增并发送
          </button>
        </footer>
      </section>
    </dialog>

    <dialog id="mailDialog" class="mail-dialog">
      <section class="dialog-form">
        <header>
          <h2>发送临时密码邮件</h2>
          <button type="button" id="closeMailDialog" class="icon-button" title="关闭" aria-label="关闭">
            <i data-lucide="x"></i>
          </button>
        </header>
        <div class="mail-content">
          <p class="mail-target" id="mailUserLabel"></p>
          <p class="mail-note">确认发送后，用户密码将修改为下面的临时密码，并通过邮件发送给该用户。</p>
          <div class="password-panel">
            <code id="mailPassword"></code>
            <button type="button" id="copyMailPassword" class="icon-button" title="复制密码" aria-label="复制密码">
              <i data-lucide="copy"></i>
            </button>
          </div>
          <p id="mailError" class="error-text" role="alert"></p>
        </div>
        <footer>
          <button type="button" id="cancelMailDialog" class="tool-button">暂不发送</button>
          <button type="button" id="confirmMailDialog" class="primary-button">
            <i data-lucide="send"></i>
            确认发送
          </button>
        </footer>
      </section>
    </dialog>

    <dialog id="reportDialog" class="report-dialog">
      <section class="dialog-form">
        <header>
          <h2>发送统计报告</h2>
          <button type="button" id="closeReportDialog" class="icon-button" title="关闭" aria-label="关闭">
            <i data-lucide="x"></i>
          </button>
        </header>
        <div class="mail-content">
          <p class="mail-target">MU User Permissions Report</p>
          <p class="mail-note">确认后将立即生成用户权限统计报告，并发送给下面的收件人。</p>
          <label>
            收件人邮箱
            <textarea id="reportRecipients" rows="5" placeholder="name@ses.ai, another@ses.ai"></textarea>
          </label>
          <p id="reportError" class="error-text" role="alert"></p>
        </div>
        <footer>
          <button type="button" id="cancelReportDialog" class="tool-button">取消</button>
          <button type="button" id="confirmReportDialog" class="primary-button">
            <i data-lucide="send"></i>
            确认发送
          </button>
        </footer>
      </section>
    </dialog>

    <div id="toast" class="toast hidden"></div>
    <script src="/static/app.js?v=20260601-7"></script>
  </body>
</html>
